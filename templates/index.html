<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Guard - Password Auditor</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --danger: #ef4444;
            --warning: #eab308;
            --success: #22c55e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h1 { margin-top: 0; font-size: 1.8rem; text-align: center; }
        p.subtitle { text-align: center; color: var(--text-muted); margin-bottom: 25px; }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 10px;
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        /* Color Bar Progress Meter */
        .meter-container {
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .meter-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .rating-text {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        /* Breach Alert Box */
        .alert-box {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
        }

        .alert-danger {
            background-color: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--danger);
            color: #fca5a5;
        }

        .alert-safe {
            background-color: rgba(34, 197, 94, 0.2);
            border: 1px solid var(--success);
            color: #86efac;
        }

        /* Explanations Section */
        .feedback-section {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
        }

        .feedback-section h3 { margin-top: 0; font-size: 1rem; color: var(--text-muted); }

        ul { padding-left: 20px; margin: 0; color: var(--text-muted); font-size: 0.95rem;}
        li { margin-bottom: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Password Strength Auditor</h1>
    <p class="subtitle">Real-time validation combined with HIBP Dark Web checks</p>

    <div class="input-group">
        <input type="text" id="passwordInput" placeholder="Type a password to audit..." autocomplete="off">
    </div>

    <div class="actions">
        <button id="generateBtn">⭐ Generate Strong Password</button>
    </div>

    <div class="meter-container">
        <div id="meterBar" class="meter-bar"></div>
    </div>
    
    <div id="ratingOutput" class="rating-text">Enter a password...</div>

    <div id="breachAlert" class="alert-box"></div>

    <div class="feedback-section">
        <h3>Analysis & Corrections</h3>
        <ul id="reasonList">
            <li>No password evaluated yet.</li>
        </ul>
    </div>
</div>

<script>
    const passwordInput = document.getElementById('passwordInput');
    const generateBtn = document.getElementById('generateBtn');
    const meterBar = document.getElementById('meterBar');
    const ratingOutput = document.getElementById('ratingOutput');
    const breachAlert = document.getElementById('breachAlert');
    const reasonList = document.getElementById('reasonList');

    // Real-time Event Listener
    passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        if (!val) {
            resetUI();
            return;
        }
        analyzePassword(val);
    });

    // Bonus Feature: Generate secure string
    generateBtn.addEventListener('click', () => {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+";
        let generated = "";
        // Assure random distribution length between 14-18 chars
        const length = Math.floor(Math.random() * 5) + 14; 
        for (let i = 0; i < length; i++) {
            generated += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        passwordInput.value = generated;
        analyzePassword(generated);
    });

    async function analyzePassword(password) {
        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await response.json();
            updateUI(data);
        } catch (err) {
            console.error("Error connecting to backend setup:", err);
        }
    }

    function updateUI(data) {
        // 1. Update Strength Meter Progress Bar (Max functional points roughly 5-6)
        const percentage = Math.min((data.score / 5) * 100, 100);
        meterBar.style.width = `${percentage}%`;

        // 2. Set Dynamic Color based on Rating string
        if (data.rating === "Weak") {
            meterBar.style.backgroundColor = "var(--danger)";
            ratingOutput.style.color = "var(--danger)";
            ratingOutput.textContent = "Rating: Weak";
        } else if (data.rating === "Moderate") {
            meterBar.style.backgroundColor = "var(--warning)";
            ratingOutput.style.color = "var(--warning)";
            ratingOutput.textContent = "Rating: Moderate";
        } else {
            meterBar.style.backgroundColor = "var(--success)";
            ratingOutput.style.color = "var(--success)";
            ratingOutput.textContent = "Rating: Strong";
        }

        // 3. Render Breach warnings (HIBP Results)
        breachAlert.style.display = "block";
        if (data.breach_count > 0) {
            breachAlert.className = "alert-box alert-danger";
            breachAlert.innerHTML = `⚠️ CRITICAL WARNING: This password was found exposed in <strong>${data.breach_count.toLocaleString()}</strong> historical data breaches! Do not use this online.`;
        } else {
            breachAlert.className = "alert-box alert-safe";
            breachAlert.textContent = "✅ Clean Record: This password does not appear in any known public breach databases.";
        }

        // 4. Print structured explanations 
        reasonList.innerHTML = "";
        data.reasons.forEach(msg => {
            const li = document.createElement('li');
            li.textContent = msg;
            reasonList.appendChild(li);
        });
    }

    function resetUI() {
        meterBar.style.width = "0%";
        ratingOutput.style.color = "var(--text-main)";
        ratingOutput.textContent = "Enter a password...";
        breachAlert.style.display = "none";
        reasonList.innerHTML = "<li>No password evaluated yet.</li>";
    }
</script>
</body>
</html>
